export default "<ion-content>\n    <ion-list>\n        <ion-item-sliding *ngFor=\"let tarea of orden.tareas; let i=index\" class=\"animated fadeInDown\">\n            <ion-item>\n                <div class=\"ion-text-uppercase\">\n                    <ion-label>\n                        <ion-text>\n                            <strong>{{tarea.tareaId}}</strong>-{{tarea.Descripcion}} ({{tarea.cantidad}})\n                        </ion-text>\n                    </ion-label>\n                </div>\n            </ion-item>\n            <ion-item-options side=\"end\" *ngIf=\"orden.estadoId== 15\">\n                <ion-item-option (click)=\"deleteTarea(i)\" color=\"danger\">\n                    <ion-icon slot=\"icon-only\" name=\"trash\"></ion-icon>\n                </ion-item-option>\n            </ion-item-options>\n        </ion-item-sliding>\n    </ion-list>\n</ion-content>\n<ion-fab *ngIf=\"orden.estadoId== 15\" vertical=\"bottom\" horizontal=\"end\" slot=\"fixed\">\n    <ion-fab-button (click)=\"addTarea()\">\n        <ion-icon name=\"add\"></ion-icon>\n    </ion-fab-button>\n</ion-fab>\n";

export default "<ion-header [translucent]=\"true\">\n    <ion-toolbar>\n        <ion-title>\n            SINCRONIZAR\n        </ion-title>\n    </ion-toolbar>\n</ion-header>\n\n<ion-content [fullscreen]=\"true\">\n    <ion-header collapse=\"condense\">\n        <ion-toolbar>\n            <ion-title size=\"large\">SINCRONIZAR</ion-title>\n        </ion-toolbar>\n    </ion-header>\n\n    <ion-list>\n        <ion-item *ngFor=\"let orden of ordenes\">\n            <ion-label class=\"ion-text-wrap\">\n                <ion-text>\n                    <b>{{orden.ordenId}} : {{orden.calle}} {{orden.numero}}</b>\n\n                    <p>\n                        {{orden.cliente}}\n                    </p>\n\n                </ion-text>\n            </ion-label>\n        </ion-item>\n\n    </ion-list>\n    <ion-row class=\"ion-padding-vertical\">\n        <ion-col size=\"12\" class=\"ion-text-right\">\n            <ion-button expand=\"block\" (click)=\"sincronizar()\" color=\"danger\">\n                sincronizar\n            </ion-button>\n        </ion-col>\n\n    </ion-row>\n</ion-content>\n";

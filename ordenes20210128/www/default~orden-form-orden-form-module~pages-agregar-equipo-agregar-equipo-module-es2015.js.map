export default "<ion-content>\n    <div class=\"spin\" *ngIf=\"cargando == true\">\n        <ion-spinner name=\"bubbles\"></ion-spinner>\n    </div>\n    <ion-list>\n        <ion-item-sliding *ngFor=\"let equipo of orden.equipos; let i=index\" class=\"animated fadeInDown\">\n            <ion-item>\n                <ion-thumbnail slot=\"start\">\n                    <img [src]=\"equipo.src\"  onError=\"src = 'assets/imags/default.png';\" >\n                </ion-thumbnail>\n                <ion-label>\n                    <h3>{{equipo.descripcion}}</h3>\n                    <ion-note color=\"dark\" slot=\"end\">{{equipo.nroSerie}}</ion-note>\n                </ion-label>\n            </ion-item>\n            <ion-item-options side=\"end\">\n                <ion-button (click)=\"deleteEquipo(i)\" fill=\"clear\">\n                    <ion-icon slot=\"icon-only\" name=\"trash\"></ion-icon>\n                </ion-button>\n            </ion-item-options>\n        </ion-item-sliding>\n    </ion-list>\n    <!--\n    <ion-row class=\"ion-padding-vertical\">\n        <ion-col class=\"ion-text-center\" *ngIf=\"orden.equipos.length > 0 && guardar\">\n            <ion-button (click)=\"saveEquipos()\" shape=\"round\">\n                Guardar\n            </ion-button>\n        </ion-col>\n    </ion-row>\n\n    -->\n</ion-content>\n<ion-fab vertical=\"bottom\" horizontal=\"end\" slot=\"fixed\">\n    <ion-fab-button (click)=\"addEquipo()\">\n        <ion-icon name=\"add\"></ion-icon>\n    </ion-fab-button>\n</ion-fab>\n";

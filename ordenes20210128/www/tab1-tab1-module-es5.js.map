export default "<ion-header>\n    <ion-toolbar>\n        <!-- <ion-buttons slot=\"start\">\n            <ion-back-button defaultHref=\"/\"></ion-back-button>\n        </ion-buttons> -->\n        <ion-title>\n            ORDENES DIARIAS\n        </ion-title>\n    </ion-toolbar>\n</ion-header>\n\n<ion-content>\n\n    <ion-list>\n        <ion-item *ngFor=\"let orden of ordeneService.ordenes\" (click)=\"verOrden(orden)\">\n            <ion-label class=\"ion-text-wrap\">\n                <ion-text>\n                    {{orden.ordenId}} : {{orden.calle}} {{orden.numero}}\n                    <p>\n                        {{orden.cliente}}\n                    </p>\n\n                </ion-text>\n            </ion-label>\n            <ion-note slot=\"end\" color=\"success\" *ngIf=\"orden.estadoId==20\">Cerrada </ion-note>\n            <ion-note slot=\"end\" color=\"danger\" *ngIf=\"orden.estadoId==15\">En curso </ion-note>\n            <ion-note slot=\"end\" color=\"dark\" *ngIf=\"orden.estadoId==90\">Anulada </ion-note>\n        </ion-item>\n\n    </ion-list>\n\n\n    <ion-fab vertical=\"bottom\" horizontal=\"end\" slot=\"fixed\">\n        <ion-fab-button (click)=\"addOrden()\">\n            <ion-icon name=\"add\"></ion-icon>\n        </ion-fab-button>\n    </ion-fab>\n</ion-content>\n";

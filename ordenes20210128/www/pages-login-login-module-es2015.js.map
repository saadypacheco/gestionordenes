export default "<ion-toolbar color=\"primary\">\n    <ion-title>WORKER</ion-title>\n    <ion-label slot=\"end\">(v2.0.8)</ion-label>\n</ion-toolbar>\n<ion-content>\n\n    <ion-slides class=\"mainSlide\" #slidePrincipal>\n        <ion-slide>\n            <form (ngSubmit)=\"login(fLogin)\" #fLogin=\"ngForm\">\n                <ion-grid fixed>\n                    <ion-row>\n                        <ion-col>\n                            <img src=\"/assets/avatars/av-1.png\">\n                        </ion-col>\n                    </ion-row>\n                    <ion-row>\n                        <ion-col>\n\n                            <ion-list>\n\n                                <ion-item>\n                                    <ion-label>Usuario: </ion-label>\n                                    <ion-input name=\"xalias\" type=\"text\" [(ngModel)]=\"loginUser.xalias\" required></ion-input>\n                                </ion-item>\n\n                                <ion-item>\n                                    <ion-label>Clave: </ion-label>\n                                    <ion-input name=\"xpass\" type=\"password\" [(ngModel)]=\"loginUser.xpass\" required></ion-input>\n                                </ion-item>\n\n                            </ion-list>\n                        </ion-col>\n                    </ion-row>\n\n                    <ion-row>\n                        <ion-col>\n                            <ion-button type=\"submit\" color=\"tertiary\" shape=\"round\">\n                                Ingresar\n                            </ion-button>\n                        </ion-col>\n                    </ion-row>\n\n                </ion-grid>\n            </form>\n\n\n\n        </ion-slide>\n        <!-- \n        <ion-slide>\n\n\n            <ion-grid fixed>\n\n                <ion-row>\n                    <ion-col>\n                        <h3>Seleccione Avatar</h3>\n                    </ion-col>\n                </ion-row>\n\n                <ion-row>\n                    <ion-col>\n                        <ion-slides [options]=\"avatarSlide\">\n                            <ion-slide *ngFor=\"let avatar of avatars\">\n                                <ion-img class=\"pick-avatar\" src=\"/assets/avatars/{{avatar.img}}\" [ngClass]=\"{ 'pick-avatar-seleccionado':avatar.seleccionado}\" (click)=\"seleccionarAvatar(avatar)\"></ion-img>\n                            </ion-slide>\n                        </ion-slides>\n                    </ion-col>\n                </ion-row>\n\n                <form (ngSubmit)=\"registro(fRegistro)\" #fRegistro=\"ngForm\">\n                    <ion-row>\n                        <ion-col>\n\n                            <ion-list>\n\n                                <ion-item>\n                                    <ion-label>Email</ion-label>\n                                    <ion-input name=\"email\" type=\"email\" required></ion-input>\n                                </ion-item>\n\n                                <ion-item>\n                                    <ion-label>Nombre</ion-label>\n                                    <ion-input name=\"nombre\" type=\"text\" required></ion-input>\n                                </ion-item>\n\n                                <ion-item>\n                                    <ion-label>Password</ion-label>\n                                    <ion-input name=\"password\" type=\"password\" required></ion-input>\n                                </ion-item>\n\n                            </ion-list>\n                        </ion-col>\n                    </ion-row>\n\n                    <ion-row>\n                        <ion-col>\n                            <ion-button type=\"submit\" color=\"tertiary\" shape=\"round\">\n                                Crear usuario\n                            </ion-button>\n                        </ion-col>\n                    </ion-row>\n\n                </form>\n            </ion-grid>\n\n\n        </ion-slide> -->\n\n\n    </ion-slides>\n\n\n\n</ion-content>\n\n<!-- \n<ion-footer no-border>\n    <ion-toolbar>\n\n        <ion-row>\n\n            <ion-col>\n                <ion-button shape=\"round\" expand=\"full\" size=\"small\" fill=\"outline\" color=\"tertiary\" (click)=\"mostrarRegistro()\"> Ingresar\n                </ion-button>\n            </ion-col>\n\n            <ion-col>\n                <ion-button shape=\"round\" expand=\"full\" size=\"small\" fill=\"outline\" color=\"tertiary\" (click)=\"mostrarLogin()\">\n                    Registrarme\n                </ion-button>\n            </ion-col>\n\n        </ion-row>\n\n\n\n    </ion-toolbar>\n</ion-footer> -->\n";

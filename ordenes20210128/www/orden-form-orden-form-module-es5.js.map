export default "<ion-header [translucent]=\"true\">\n    <ion-toolbar>\n        <ion-title>ORDEN {{orden.ordenId}}</ion-title>\n        <ion-buttons slot=\"primary\">\n            <!-- <ion-button expand=\"full\" shape=\"round\" (click)=\"gallery()\">\n                <ion-icon slot=\"icon-only\" name=\"images\" color=\"success\"></ion-icon>\n            </ion-button> -->\n            <ion-button expand=\"full\" shape=\"round\" (click)=\"saveAnularOrden()\" [(disabled)]=\"disabledOrden\">\n                <ion-icon slot=\"icon-only\" name=\"trash\" color=\"light\"></ion-icon>\n            </ion-button>\n            <ion-button expand=\"full\" shape=\"round\" (click)=\"saveCloseOrden()\" [(disabled)]=\"disabledOrden\">\n                <ion-icon size=\"large\" slot=\"icon-only\" name=\"checkmark\" color=\"tertiary\"></ion-icon>\n            </ion-button>\n        </ion-buttons>\n    </ion-toolbar>\n\n</ion-header>\n<ion-content padding>\n    <ion-toolbar mode=\"md\" no-border-bottom no-border-top no-border>\n        <ion-segment value=\"Tareas\" (ionChange)=\"segmentChanged($event)\" scrollable=true>\n            <ion-segment-button value=\"Tareas\">\n                <ion-icon size=\"small\" name=\"construct-outline\">></ion-icon>\n                <ion-label>Tareas</ion-label>\n            </ion-segment-button>\n            <ion-segment-button value=\"Equipos\">\n                <ion-icon name=\"desktop-outline\" size=\"small\"></ion-icon>\n                <ion-label>Equipos</ion-label>\n            </ion-segment-button>\n\n            <ion-segment-button value=\"Recuperos\">\n                <ion-icon name=\"download-outline\" size=\"small\"></ion-icon>\n                <ion-label>Recuperos</ion-label>\n            </ion-segment-button>\n\n            <ion-segment-button value=\"Materiales\">\n                <ion-icon name=\"list-outline\" size=\"small\"></ion-icon>\n                <ion-label>Materiales</ion-label>\n            </ion-segment-button>\n\n            <ion-segment-button value=\"Comentarios\">\n                <ion-icon name=\"document-attach-outline\" size=\"small\"></ion-icon>\n                <ion-label>Comentarios</ion-label>\n            </ion-segment-button>\n            <ion-segment-button value=\"Datos\">\n                <ion-icon name=\"bookmark\" size=\"small\"></ion-icon>\n                <ion-label>Datos</ion-label>\n            </ion-segment-button>\n            <ion-segment-button value=\"Galeria\">\n                <ion-icon name=\"images\" size=\"small\"></ion-icon>\n                <ion-label>Galeria</ion-label>\n            </ion-segment-button>\n        </ion-segment>\n    </ion-toolbar>\n\n    <app-agregar-tarea *ngIf=\"segmentValue=='Tareas'\" [orden]=orden> </app-agregar-tarea>\n    <app-datos-form *ngIf=\"segmentValue=='Datos'\" [orden]=orden> </app-datos-form>\n    <app-comentarios-form *ngIf=\"segmentValue=='Comentarios'\" [orden]=orden> </app-comentarios-form>\n    <app-agregar-equipo *ngIf=\"segmentValue=='Equipos'\" [orden]=orden></app-agregar-equipo>\n    <app-agregar-recupero *ngIf=\"segmentValue=='Recuperos'\" [orden]=orden></app-agregar-recupero>\n    <app-agregar-material *ngIf=\"segmentValue=='Materiales'\" [orden]=orden></app-agregar-material>\n    <app-fotos *ngIf=\"segmentValue=='Galeria'\" [orden]=orden></app-fotos>\n\n</ion-content>\n";

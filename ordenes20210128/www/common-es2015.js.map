export default "<ion-content>\n    <!-- ({{orden.movilId}}) {{usuService.usuario.descripcion}} - {{usuService.usuario.Apellido}}  {{usuService.usuario.Nombre}} -->\n    <ion-list>\n\n        <ion-item [disabled]=\"orden.estadoId !=15\">\n            <ion-label>Tipo Trabajo</ion-label>\n            <ion-select [(ngModel)]=\"orden.tipoTrabajoId\" interface=\"popover\" placeholder=\"seleccionar ...\" required>\n                <ion-select-option *ngFor=\"let tipo of dataService.listaTipoTrabajo\" [(value)]=\"tipo.tipoTrabajoId\">{{tipo.descripcion}}</ion-select-option>\n            </ion-select>\n        </ion-item>\n\n        <!-- <ion-item-divider color=\"medium\">\n            <ion-label>\n                <p> DATOS DEL CLIENTE </p>\n            </ion-label>\n        </ion-item-divider> -->\n        <ion-item [disabled]=\"orden.estadoId !=15\">\n            <ion-label position=\"floating\"> Cliente </ion-label>\n            <ion-input type=\"text\" [(ngModel)]=\"orden.cliente\" required> </ion-input>\n        </ion-item>\n        <ion-row>\n            <ion-col size=\"7\">\n                <ion-item [disabled]=\"orden.estadoId !=15\">\n                    <ion-label position=\"floating\"> Calle </ion-label>\n                    <ion-input type=\"text\" [(ngModel)]=\"orden.calle\" required> </ion-input>\n                </ion-item>\n            </ion-col>\n            <ion-col>\n                <ion-item [disabled]=\"orden.estadoId !=15\">\n                    <ion-label position=\"floating\"> Nro. </ion-label>\n                    <ion-input type=\"tel\" [(ngModel)]=\"orden.numero\" required> </ion-input>\n                </ion-item>\n            </ion-col>\n        </ion-row>\n\n    </ion-list>\n\n    <ion-row>\n        <ion-col size=\"12\" class=\"ion-text-center\">\n            <ion-button (click)=\"saveNewOrden()\" *ngIf=\"orden.estadoId ==15\">\n                Guardar\n            </ion-button>\n        </ion-col>\n    </ion-row>\n\n\n</ion-content>\n";

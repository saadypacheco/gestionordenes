export default "<ion-content>\n\n    <ion-list padding-top>\n        <ion-item [disabled]=\"orden.estadoId== 20\">\n\n            <ion-textarea type=\"text\" [(ngModel)]=\"orden.comentarios\" rows=\"10\" cols=\"50\" placeholder=\"Ingrese aqui sus comentarios...\"></ion-textarea>\n            <ion-textarea type=\"text\"></ion-textarea>\n        </ion-item>\n\n        <ion-row>\n            <ion-col size=\"12\" class=\"ion-text-center\">\n                <ion-button (click)=\"saveNewOrden()\" *ngIf=\"orden.estadoId== 15\">\n                    Guardar\n                </ion-button>\n            </ion-col>\n        </ion-row>\n    </ion-list>\n</ion-content>\n";

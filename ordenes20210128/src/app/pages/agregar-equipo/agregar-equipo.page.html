<ion-content>
    <div class="spin" *ngIf="cargando == true">
        <ion-spinner name="bubbles"></ion-spinner>
    </div>
    <ion-list>
        <ion-item-sliding *ngFor="let equipo of orden.equipos; let i=index" class="animated fadeInDown">
            <ion-item>
                <ion-thumbnail slot="start">
                    <img [src]="equipo.src"  onError="src = 'assets/imags/default.png';" >
                </ion-thumbnail>
                <ion-label>
                    <h3>{{equipo.descripcion}}</h3>
                    <ion-note color="dark" slot="end">{{equipo.nroSerie}}</ion-note>
                </ion-label>
            </ion-item>
            <ion-item-options side="end">
                <ion-button (click)="deleteEquipo(i)" fill="clear">
                    <ion-icon slot="icon-only" name="trash"></ion-icon>
                </ion-button>
            </ion-item-options>
        </ion-item-sliding>
    </ion-list>
    <!--
    <ion-row class="ion-padding-vertical">
        <ion-col class="ion-text-center" *ngIf="orden.equipos.length > 0 && guardar">
            <ion-button (click)="saveEquipos()" shape="round">
                Guardar
            </ion-button>
        </ion-col>
    </ion-row>

    -->
</ion-content>
<ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addEquipo()">
        <ion-icon name="add"></ion-icon>
    </ion-fab-button>
</ion-fab>

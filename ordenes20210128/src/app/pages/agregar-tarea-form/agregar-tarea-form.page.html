<ion-header no-border>
    <ion-toolbar>
        <ion-title text-capitalize> REGISTRAR TAREA</ion-title>
    </ion-toolbar>
</ion-header>

<ion-list>
    <ion-item>
        <ion-label class="ion-text-wrap">
            <ion-text>
                <b>Orden: {{orden.ordenId}} </b>
                <p><b>Direccion:{{orden.calle}} {{orden.numero}}</b></p>
                <p>Cliente: {{orden.cliente}}</p>
            </ion-text>
        </ion-label>
    </ion-item>

</ion-list>

<ion-content class="ion-padding-top">
    <form (ngSubmit)="saveNewTarea(fTarea)" #fTarea="ngForm">
        <ion-list>
            <ion-item class="padding">
                <ion-label position="floating"> Tarea </ion-label>
                <ionic-selectable name="tarea" item-content slot [(ngModel)]="tareaSelected" 
                [items]="tareas" itemValueField="tareaId" 
                itemTextField="descripcion" 
                closeButtonText="Cerrar"
                closeButtonSlot="end"
                interface="popover"    
                [canSearch]="true" 
                searchFailText="Lo sentimos no hay resultado " 
                (onSearch)="buscarTarea($event)">
                    <ng-template ionicSelectableItemTemplate let-tareaSelected="item">
                        <ion-text class="ion-text-lowercase">
                            {{tareaSelected.tareaId}} - {{tareaSelected.descripcion}}
                        </ion-text>
                    </ng-template>
                </ionic-selectable>
            </ion-item>

            <ion-item class="padding">
                <ion-label position="floating"> Cantidad </ion-label>
                <ion-input name="cantidad" type="tel" [(ngModel)]="cantidad" required> </ion-input>
            </ion-item>

        </ion-list>


        <ion-row class="ion-padding-vertical">
            <ion-col size="6" class="ion-text-right">
                <ion-button (click)="cancelAddTarea()" color="danger" shape="round">
                    Cancelar
                </ion-button>
            </ion-col>
            <ion-col size="6" class="ion-text-left">
                <ion-button type="submit" shape="round">
                    Guardar
                </ion-button>
            </ion-col>
        </ion-row>
    </form>
</ion-content>

<ion-content>
  <ion-list>
      
      <ion-item-sliding *ngFor="let material of orden.materiales; let i=index" class="animated fadeInDown">
          <ion-item  >

                      <p>{{material.descriopcion}} </p>
                      <p  slot="end">({{material.Cantidad}})</p>

          </ion-item>
          <ion-item-options side="end"  *ngIf="orden.estadoId== 15" >
              <ion-item-option (click)="deleteMaterial(i)" color="danger">
                  <ion-icon slot="icon-only" name="trash"></ion-icon>
              </ion-item-option>
          </ion-item-options>
      </ion-item-sliding>
  </ion-list>
</ion-content>
<ion-fab  *ngIf="orden.estadoId== 15" vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button (click)="addMaterial()">
      <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
